<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRTALK - Stranger Audio Call</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Left Icon -->
    <button class="top-icon-btn" id="openFriendsBtn">
        <i class="fas fa-user-friends"></i>
    </button>

    <!-- Left Slide Panel -->
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <h2 id="panelTitle">Friend List</h2>
            <button class="close-btn" id="closePanelBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="panel-content" id="panelContent">
            <!-- List items dynamically injected here -->
        </div>
    </div>

    <div class="app-container">
        <!-- Left Sidebar (Controls) -->
        <div class="sidebar">
            <div class="logo-container">
                <div class="logo-circle" id="logoCircle">
                    <svg class="air-logo" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="5">
                        <polygon points="50,20 85,80 15,80" stroke-linejoin="round" />
                        <line x1="8" y1="55" x2="92" y2="55" stroke-linecap="round" />
                    </svg>
                    <h1 class="logo-text">AIRTALK</h1>
                    <div class="call-timer" id="callTimer" style="display: none;">00:00:00</div>
                </div>
                <div class="video-container" id="videoContainer" style="display: none;">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="call-timer-video" id="callTimerVideo">00:00:00</div>
                </div>
            </div>

            <div class="action-buttons" style="gap: 15px; flex-wrap: wrap; justify-content: center;">
                <div class="action-btn-wrapper">
                    <button id="callBtn" class="action-btn call-btn">
                        <i class="fas fa-phone-alt"></i>
                    </button>
                    <span>Call</span>
                </div>
                <div class="action-btn-wrapper" id="videoBtnWrapper" style="display: none;">
                    <button id="videoBtn" class="action-btn video-btn">
                        <i class="fas fa-video-slash"></i>
                    </button>
                    <span id="videoBtnText" style="color:#50606e; font-weight:700;">Video</span>
                </div>
                <div class="action-btn-wrapper">
                    <button id="muteBtn" class="action-btn mute-btn">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <span>Mute</span>
                </div>
                <div class="action-btn-wrapper">
                    <button id="addFriendBtn" class="action-btn friend-btn">
                        <i class="fas fa-user-plus"></i>
                    </button>
                    <span>Add Friend</span>
                </div>
                <div class="action-btn-wrapper">
                    <button id="reportBtn" class="action-btn report-btn">
                        <i class="fas fa-exclamation-triangle"></i>
                    </button>
                    <span>Report</span>
                </div>
            </div>

            <div class="settings-row">
                <label class="checkbox-container">
                    <input type="checkbox" id="autoCall">
                    <span class="checkmark"></span>
                    Enable Auto Call
                </label>
                <div class="divider">|</div>
                <a href="#" class="history-link">
                    <i class="fab fa-whatsapp"></i> Call History
                </a>
            </div>

            <div class="filter-container">
                <select id="myGender" class="filter-select">
                    <option value="any">I am: Secret</option>
                    <option value="male">I am: Male</option>
                    <option value="female">I am: Female</option>
                </select>
                <select id="targetGender" class="filter-select">
                    <option value="any">Meet: Any Gender</option>
                    <option value="male">Meet: Male</option>
                    <option value="female">Meet: Female</option>
                </select>
                <select id="targetCountry" class="filter-select">
                    <option value="any">Meet: Any Country</option>
                    <option value="same">Meet: Same Country</option>
                </select>
            </div>

            <p class="status-msg">Tap the <span class="highlight-green">Call</span> button to call a new stranger</p>
        </div>

        <!-- Right Side (Chat / Interaction Area) -->
        <div class="main-content">
            <div class="online-badge">
                <div class="online-dot"></div>
                <span id="onlineCount">0</span> Online Now
            </div>
            
            <div class="chat-area">
                <div class="chat-bg-pattern"></div>
                <div class="chat-messages" id="chatMessages">
                    <!-- Messages will appear here -->
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span> typing...
            </div>

            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Type a message..." disabled>
                <button class="icon-btn camera-btn" id="cameraBtn" disabled><i class="fas fa-camera"></i></button>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <button class="icon-btn send-btn" id="sendBtn" disabled><i class="far fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <audio id="remoteAudio" autoplay></audio>

    <!-- Incoming Call Notification Popup -->
    <div id="incomingCallNotification" class="incoming-call-modal">
        <div class="incoming-avatar">
            <i class="fas fa-user-circle"></i>
        </div>
        <div class="incoming-title" id="incomingCallerName">Unknown</div>
        <div class="incoming-subtitle">is calling you...</div>
        
        <div class="incoming-actions-large">
            <button id="acceptDirectCallBtn" class="incoming-btn-large accept">Accept</button>
            <button id="declineDirectCallBtn" class="incoming-btn-large decline">Cancel</button>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
